 <script>
        let producto = prompt("Nombre del producto:");
        let precio = parseFloat(prompt("Precio del producto:"));
        let cantidad = parseInt(prompt("Cantidad comprada:"));
        let total = precio * cantidad;
        
        document.write("Producto comprado: " + producto + "<br>");
        document.write("Precio unitario: $" + precio + "<br>");
        document.write("Cantidad: " + cantidad + "<br>");
        document.write("Total a pagar: $" + total);
    </script>
